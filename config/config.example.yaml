# MarketPulse 配置模板 — 复制为 config/config.yaml（已 gitignore）

app:
  addr: ":8080"
  mode: "debug" # debug | release
  log_dir: "log"
  # 生产 IP+端口 单进程部署时设为 web/dist 目录（见 make ship）
  # static_dir: "web/dist"

cors:
  allowed_origins:
    - "http://localhost:5173"

symbols:
  - BTC
  - ETH
  - BNB
  - LTC
  - FIL

alpha:
  enabled: true
  quote_asset: USDT
  poll_interval: 30s
  resolve_interval: 10m
  indices:
    - id: qqqon
      name: QQQ
      symbol: QQQONUSDT
    - id: spyon
      name: SPY
      symbol: SPYONUSDT
  stocks:
    - id: aaplon
      name: AAPL
      symbol: AAPLONUSDT
    - id: msfton
      name: MSFT
      symbol: MSFTONUSDT
    - id: nvdaon
      name: NVDA
      symbol: NVDAONUSDT
    - id: amznon
      name: AMZN
      symbol: AMZNONUSDT
    - id: googlon
      name: GOOGL
      symbol: GOOGLONUSDT
    - id: metaon
      name: META
      symbol: METAONUSDT
    - id: tslaon
      name: TSLA
      symbol: TSLAONUSDT

ingest:
  binance:
    # 合并流示例，实现时按 symbols 生成
    ws_base: "wss://stream.binance.com:9443/stream"
  otc:
    usdt_cny_interval: 30s
  forex:
    usd_cny_interval: 1h
  equity:
    interval: 60s
    providers:
      - tencent
      - eastmoney
    index_ids:
      - sh000001
      - sz399001
      - sz399006
      - sh000688
      - hsi
      - n225
      - ks11
      - dji
      - ixic
      - gspc
      - gold
      - silver
      - crude
  macro:
    interval: 5m
