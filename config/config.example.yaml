# MarketPulse 配置模板 — 复制为 config/config.yaml（已 gitignore）

app:
  addr: ":8080"
  mode: "debug" # debug | release
  log_dir: "log"
  # 生产 IP+端口 单进程部署时设为 web/dist 目录（见 make ship）
  # static_dir: "web/dist"

cors:
  allowed_origins:
    - "http://localhost:5173"

symbols:
  - BTC
  - ETH
  - BNB
  - LTC
  - FIL

alpha:
  enabled: true
  provider: bitget
  product_type: USDT-FUTURES
  quote_asset: USDT
  poll_interval: 30s
  resolve_interval: 10m
  indices:
    - id: qqq
      name: 纳指ETF
      symbol: QQQUSDT
    - id: spy
      name: 标普ETF
      symbol: SPYUSDT
  stocks:
    - id: aapl
      name: 苹果
      symbol: AAPLUSDT
    - id: msft
      name: 微软
      symbol: MSFTUSDT
    - id: nvda
      name: 英伟达
      symbol: NVDAUSDT
    - id: amzn
      name: 亚马逊
      symbol: AMZNUSDT
    - id: googl
      name: 谷歌
      symbol: GOOGLUSDT
    - id: meta
      name: META
      symbol: METAUSDT
    - id: tsla
      name: 特斯拉
      symbol: TSLAUSDT

ingest:
  binance:
    # 合并流示例，实现时按 symbols 生成
    ws_base: "wss://stream.binance.com:9443/stream"
  otc:
    usdt_cny_interval: 30s
  forex:
    usd_cny_interval: 1h
  equity:
    interval: 60s
    providers:
      - tencent
      - eastmoney
    index_ids:
      - sh000001
      - sz399001
      - sz399006
      - sh000300
      - sh000688
      - hsi
      - n225
      - ks11
      - dji
      - ixic
      - gspc
      - gold
      - silver
      - crude
  internals:
    interval: 60s
    idle_interval: 1h
  macro:
    interval: 5m
