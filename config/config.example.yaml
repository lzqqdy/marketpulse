# MarketPulse 配置模板 — 复制为 config/config.yaml（已 gitignore）
#
# 依赖链（灰度开关，默认全关 → 行为与「仅行情」一致）：
#   users     需要 mysql + redis
#   alerts    需要 mysql + redis + users；邮件通道另需 smtp
#   portfolio 需要 mysql + users（不强制 redis）
# 依赖未开时对应模块会 soft-skip 并打 warn，行情仍可启动。

app:
  addr: ":8080"
  mode: "debug" # debug | release
  log_dir: "log"
  # 生产 IP+端口 单进程部署时设为 web/dist 目录（见 make ship）
  # static_dir: "web/dist"

cors:
  allowed_origins:
    - "http://localhost:5173"

# 平台持久化（users / alerts / portfolio 等模块依赖）
# 默认关闭：不启用时 marketd 行为与现网一致，可随时回滚
mysql:
  enabled: false
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: ""
  database: "marketpulse"
  params: "parseTime=true&loc=Local&charset=utf8mb4"
  max_open_conns: 20
  max_idle_conns: 5
  conn_max_lifetime: 1h
  conn_max_idle_time: 10m

redis:
  enabled: false
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  pool_size: 10
  min_idle_conns: 0
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s

# 用户中心（需同时开启 mysql + redis）
# 若 users.enabled=true 但依赖未开，会自动跳过用户模块并 warn，行情仍可启动
users:
  enabled: false
  auto_migrate: true
  session_ttl: 168h
  seed:
    phone: ""
    password: ""
    display_name: "管理员"
  # 登录防刷（Redis）
  security:
    max_attempts_per_ip: 30
    max_attempts_per_phone: 15
    window: 15m
    lockout_failures: 5
    lockout_ttl: 15m

# 推送告警（需同时开启 mysql + redis + users）
alerts:
  enabled: false
  auto_migrate: true
  daily_timezone: Asia/Shanghai
  loop_interval_min: 1
  loop_interval_max: 1440
  inbox_max_len: 100

# 资产中心（需 mysql + users；不强制 redis）
portfolio:
  enabled: false
  auto_migrate: true
  daily_timezone: Asia/Shanghai
  default_usdt_cny: 6.5

smtp:
  host: ""
  port: 465
  username: ""
  password: ""
  from: ""

# 本地文件上传（头像等），默认落到 data/uploads，经 /uploads 访问
upload:
  dir: "data/uploads"
  public_path: "/uploads"
  max_avatar_bytes: 10485760

symbols:
  - BTC
  - ETH
  - BNB
  - LTC
  - FIL

alpha:
  enabled: true
  provider: bitget
  product_type: USDT-FUTURES
  quote_asset: USDT
  poll_interval: 30s
  resolve_interval: 10m
  indices:
    - id: qqq
      name: 纳指ETF
      symbol: QQQUSDT
    - id: spy
      name: 标普ETF
      symbol: SPYUSDT
  stocks:
    - id: aapl
      name: 苹果
      symbol: AAPLUSDT
    - id: msft
      name: 微软
      symbol: MSFTUSDT
    - id: nvda
      name: 英伟达
      symbol: NVDAUSDT
    - id: amzn
      name: 亚马逊
      symbol: AMZNUSDT
    - id: googl
      name: 谷歌
      symbol: GOOGLUSDT
    - id: meta
      name: META
      symbol: METAUSDT
    - id: tsla
      name: 特斯拉
      symbol: TSLAUSDT
    - id: mu
      name: 美光
      symbol: MUUSDT

ingest:
  binance:
    # 合并流示例，实现时按 symbols 生成
    ws_base: "wss://stream.binance.com:9443/stream"
  baidu:
    enabled: true
    base_url: "https://finance.pae.baidu.com"
    ws_url: "wss://finance-ws.pae.baidu.com"
    ws_enabled: true
    ws_reconnect_max: 5
    ws_reconnect_delay: 3s
    ws_patch_interval: 60s
  otc:
    usdt_cny_interval: 30s
  forex:
    usd_cny_interval: 1h
  equity:
    interval: 60s
    providers:
      - baidu
      - tencent
      - eastmoney
    index_ids:
      - sh000001
      - sz399001
      - sz399006
      - sh000300
      - sh000688
      - hsi
      - n225
      - ks11
      - dji
      - ixic
      - gspc
      - gold
      - silver
      - crude
  macro:
    interval: 5m
