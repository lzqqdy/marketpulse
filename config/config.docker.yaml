# MarketPulse 容器默认配置（可挂载覆盖；密钥用环境变量）
# 用法见 deploy/docker.md

app:
  addr: "0.0.0.0:8080"
  mode: "release"
  log_dir: "log"
  static_dir: "web/dist"

cors:
  allowed_origins: []

mysql:
  enabled: false
  host: "mysql"
  port: 3306
  user: "marketpulse"
  password: ""
  database: "marketpulse"
  params: "parseTime=true&loc=Local&charset=utf8mb4"
  max_open_conns: 20
  max_idle_conns: 5
  conn_max_lifetime: 1h
  conn_max_idle_time: 10m

redis:
  enabled: false
  addr: "redis:6379"
  password: ""
  db: 0
  pool_size: 10
  min_idle_conns: 0
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s

users:
  enabled: false
  auto_migrate: true
  session_ttl: 168h
  seed:
    phone: ""
    password: ""
    display_name: "管理员"
  security:
    max_attempts_per_ip: 30
    max_attempts_per_phone: 15
    window: 15m
    lockout_failures: 5
    lockout_ttl: 15m

alerts:
  enabled: false
  auto_migrate: true
  daily_timezone: Asia/Shanghai
  loop_interval_min: 1
  loop_interval_max: 1440
  inbox_max_len: 100

portfolio:
  enabled: false
  auto_migrate: true
  daily_timezone: Asia/Shanghai
  default_usdt_cny: 6.5

ai:
  enabled: false
  auto_migrate: true
  provider: deepseek
  base_url: "https://api.deepseek.com"
  api_key: ""
  model: "deepseek-v4-flash"
  timeout: 120s
  max_tool_rounds: 6
  max_history_messages: 40
  daily_quota_per_user: 50
  system_prompt: ""

smtp:
  host: ""
  port: 465
  username: ""
  password: ""
  from: ""

upload:
  dir: "data/uploads"
  public_path: "/uploads"
  max_avatar_bytes: 10485760

symbols:
  - BTC
  - ETH
  - BNB
  - LTC
  - FIL

alpha:
  enabled: true
  provider: bitget
  product_type: USDT-FUTURES
  quote_asset: USDT
  poll_interval: 30s
  resolve_interval: 10m
  indices:
    - id: qqq
      name: 纳指ETF
      symbol: QQQUSDT
    - id: spy
      name: 标普ETF
      symbol: SPYUSDT
  stocks:
    - id: aapl
      name: 苹果
      symbol: AAPLUSDT
    - id: msft
      name: 微软
      symbol: MSFTUSDT
    - id: nvda
      name: 英伟达
      symbol: NVDAUSDT
    - id: amzn
      name: 亚马逊
      symbol: AMZNUSDT
    - id: googl
      name: 谷歌
      symbol: GOOGLUSDT
    - id: meta
      name: META
      symbol: METAUSDT
    - id: tsla
      name: 特斯拉
      symbol: TSLAUSDT
    - id: mu
      name: 美光
      symbol: MUUSDT

ingest:
  binance:
    ws_base: "wss://stream.binance.com:9443/stream"
  baidu:
    enabled: true
    base_url: "https://finance.pae.baidu.com"
    ws_url: "wss://finance-ws.pae.baidu.com"
    ws_enabled: true
    ws_reconnect_max: 5
    ws_reconnect_delay: 3s
    ws_patch_interval: 60s
  otc:
    usdt_cny_interval: 30s
  forex:
    usd_cny_interval: 1h
  equity:
    interval: 60s
    providers:
      - baidu
      - tencent
      - eastmoney
    index_ids:
      - sh000001
      - sz399001
      - sz399006
      - sh000300
      - sh000688
      - hsi
      - n225
      - ks11
      - dji
      - ixic
      - gspc
      - gold
      - silver
      - crude
  macro:
    interval: 5m
