openapi: 3.0.3
info:
  title: Baidu Finance (FinScope) Public API
  description: |
    百度财经 PC Web 公开 HTTP API 规范，供 MarketPulse 数据源接入参考。

    - 调研时间：2026-07-10
    - 来源：`finance.baidu.com` / `finance.pae.baidu.com` 前端 JS Bundle 静态扫描 + 匿名 curl 探测
    - 约束：仅记录浏览器正常访问时的公开接口；不含登录破解、App 专用接口

    **重要**：`/sapi/v1/get_candlestick_event` 为技术形态事件，**不是 K 线 OHLCV**。
    K 线/分时请使用 `/selfselect/getstockquotation`。

    WebSocket 实时推送：`wss://finance-ws.pae.baidu.com`（见文档 `x-websocket` 扩展）。
  version: 1.0.0
  contact:
    name: MarketPulse
  license:
    name: Internal Reference Only
    url: https://finance.baidu.com

servers:
  - url: https://finance.pae.baidu.com
    description: 核心 API 网关
  - url: https://sp0.baidu.com/5LMDcjW6BwF3otqbppnN2DJv/finance.pae.baidu.com
    description: 百度 CDN 代理（部分接口可选，非必须）

tags:
  - name: Quote
    description: 实时行情、盘口、简版报价
  - name: Chart
    description: K 线、分时、五日图
  - name: Market
    description: 市场状态、指数 Banner、全球概览
  - name: Ranking
    description: 排行榜、热搜、机构持股
  - name: Sector
    description: 行业/概念/地域板块、成分股
  - name: FundFlow
    description: 资金流向
  - name: News
    description: 快讯、新闻、公告
  - name: Finance
    description: 财务、分析、Widget、主营构成
  - name: Technical
    description: 技术分析事件与指标图形
  - name: ETF
    description: ETF 持仓
  - name: Fund
    description: 基金排行
  - name: Futures
    description: 期货
  - name: Forex
    description: 外汇
  - name: Bond
    description: 债券
  - name: Calendar
    description: 财经日历、宏观矩阵
  - name: Search
    description: 搜索建议与推荐
  - name: Community
    description: 股评、投票、舆情
  - name: Watchlist
    description: 自选股（多数需登录）
  - name: Meta
    description: 应用元数据、异步聚合
  - name: OpenData
    description: OpenData 聚合接口

security: []

paths:
  # ─── Quote ───────────────────────────────────────────────────────────
  /vapi/v1/getquotation:
    get:
      tags: [Quote]
      operationId: getQuotation
      summary: 实时行情快照（盘口、买卖五档、分时入口）
      description: |
        返回当前价格、盘口指标、买卖五档等。`group` 通常设为 `quotation_minute_{market}`。
      parameters:
        - $ref: '#/components/parameters/code'
        - $ref: '#/components/parameters/marketType'
        - $ref: '#/components/parameters/financeType'
        - name: group
          in: query
          required: true
          schema:
            type: string
            example: quotation_minute_ab
          description: 数据分组，如 `quotation_minute_ab`、`quotation_index_ab`
        - name: pointType
          in: query
          schema:
            type: string
            default: string
        - $ref: '#/components/parameters/newFormat'
        - $ref: '#/components/parameters/finClientType'
        - name: query
          in: query
          schema:
            type: string
          description: 通常与 code 相同
        - name: name
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 行情数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotationResponse'
      x-stability: 5
      x-auth-required: false

  /vapi/stockshort:
    get:
      tags: [Quote]
      operationId: getStockShort
      summary: 股票简版行情
      parameters:
        - $ref: '#/components/parameters/code'
        - $ref: '#/components/parameters/market'
      responses:
        '200':
          description: 名称 + 价格 + 涨跌幅
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 4

  /sapi/v1/quotation:
    get:
      tags: [Quote]
      operationId: getSapiQuotation
      summary: SAPI 行情（参数敏感，实测常空返回）
      parameters:
        - $ref: '#/components/parameters/code'
        - $ref: '#/components/parameters/market'
        - $ref: '#/components/parameters/financeType'
        - $ref: '#/components/parameters/finClientType'
      responses:
        '200':
          description: 行情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 2

  # ─── Chart ───────────────────────────────────────────────────────────
  /selfselect/getstockquotation:
    get:
      tags: [Chart]
      operationId: getStockQuotation
      summary: K 线 / 分时 / 五日图（核心图表接口）
      description: |
        统一图表数据入口。通过 `group` 区分场景：

        | group | 说明 |
        | --- | --- |
        | `quotation_minute_{market}` | 分时 |
        | `quotation_kline_{market}` | K 线（需 eprop + ktype） |
        | `quotation_fiveday_{market}` | 五日 |
        | `quotation_index_{type}` | 指数（+ isIndex=1） |
        | `quotation_block_{type}` | 板块（+ isBlock=1） |
        | `quotation_futures_{type}` | 期货（+ isFutures=1） |
      parameters:
        - name: group
          in: query
          required: true
          schema:
            type: string
            example: quotation_kline_ab
        - $ref: '#/components/parameters/marketType'
        - $ref: '#/components/parameters/code'
        - name: newFormat
          in: query
          schema:
            type: integer
            default: 1
        - name: all
          in: query
          schema:
            type: integer
            default: 1
        - $ref: '#/components/parameters/eprop'
        - $ref: '#/components/parameters/ktype'
        - name: isIndex
          in: query
          schema:
            type: integer
            enum: [0, 1]
        - name: isBlock
          in: query
          schema:
            type: integer
            enum: [0, 1]
        - name: isFutures
          in: query
          schema:
            type: integer
            enum: [0, 1]
        - name: isStock
          in: query
          schema:
            type: integer
            enum: [0, 1]
        - name: isEtf
          in: query
          schema:
            type: integer
            enum: [0, 1]
        - name: is_kc
          in: query
          schema:
            type: integer
            description: 科创板标记
        - name: isPaged
          in: query
          schema:
            type: integer
            enum: [0, 1]
        - name: count
          in: query
          schema:
            type: integer
            description: 分页时每页 K 线根数
        - name: start_time
          in: query
          schema:
            type: integer
            format: int64
            description: Unix 秒，向前翻页
      responses:
        '200':
          description: 图表数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartResponse'
              examples:
                kline:
                  summary: 日 K 示例
                  value:
                    QueryID: '4258857025'
                    ResultCode: '0'
                    Result:
                      newMarketData:
                        headers: ['时间戳', '时间', '开盘', '收盘', '成交量', '最高', '最低', '成交额']
                        keys: [timestamp, time, open, close, volume, high, low, amount]
                        marketData: '1523462400,2018-04-12,419.20,409.40,3071361,422.08,407.42,2139139504.00'
      x-stability: 5
      x-auth-required: false

  # ─── Market ──────────────────────────────────────────────────────────
  /sapi/v1/marketquote:
    get:
      tags: [Market]
      operationId: getMarketQuote
      summary: 市场交易状态
      parameters:
        - name: bizType
          in: query
          required: true
          schema:
            type: string
            enum: [marketStatus]
      responses:
        '200':
          description: 各市场开闭市状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketStatusResponse'
      x-stability: 5

  /api/indexbanner:
    get:
      tags: [Market]
      operationId: getIndexBanner
      summary: 首页指数行情条
      responses:
        '200':
          description: 上证/深证等指数实时价 + 分时点序列 p
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 5

  /api/getbanner:
    get:
      tags: [Market]
      operationId: getBanner
      summary: 首页行情 Banner（含 tabs）
      responses:
        '200':
          description: 指数行情 + 分时
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 5

  /api/getforeignbanner:
    get:
      tags: [Market, Forex]
      operationId: getForeignBanner
      summary: 外汇 Banner（如 USDCNY）
      responses:
        '200':
          description: 外汇对实时行情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 5

  /vapi/index/overview:
    get:
      tags: [Market]
      operationId: getIndexOverview
      summary: 全球市场指数地图
      parameters:
        - $ref: '#/components/parameters/market'
      responses:
        '200':
          description: index_map 全球市场指数
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 4

  /vapi/v1/globalindexrank:
    get:
      tags: [Market, Ranking]
      operationId: getGlobalIndexRank
      summary: 全球指数排行
      parameters:
        - $ref: '#/components/parameters/pn'
        - $ref: '#/components/parameters/rn'
        - name: area
          in: query
          schema:
            type: string
            enum: [all, asia, america, europeafrica, other]
      responses:
        '200':
          description: 全球指数列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 4

  /vapi/v1/gettradeinfo:
    get:
      tags: [Market]
      operationId: getTradeInfo
      summary: 沪深港通交易信息
      parameters:
        - $ref: '#/components/parameters/code'
        - $ref: '#/components/parameters/market'
      responses:
        '200':
          description: 沪股通/深股通/港股通指数
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 4

  /api/stockwidget:
    get:
      tags: [Market]
      operationId: getStockWidget
      summary: 股票 Widget 数据
      parameters:
        - $ref: '#/components/parameters/code'
        - $ref: '#/components/parameters/market'
      responses:
        '200':
          description: Widget 数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 2

  /api/relatedindex:
    get:
      tags: [Market, Sector]
      operationId: getRelatedIndex
      summary: 关联指数列表
      parameters:
        - $ref: '#/components/parameters/market'
        - $ref: '#/components/parameters/code'
      responses:
        '200':
          description: 相关指数
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 4

  /api/getrelatedblock:
    get:
      tags: [Sector]
      operationId: getRelatedBlock
      summary: 关联板块
      parameters:
        - $ref: '#/components/parameters/code'
        - $ref: '#/components/parameters/market'
      responses:
        '200':
          description: 关联板块列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 2

  # ─── Ranking ─────────────────────────────────────────────────────────
  /vapi/v1/hotrank:
    get:
      tags: [Ranking]
      operationId: getHotRank
      summary: 热搜股票榜
      parameters:
        - name: tn
          in: query
          schema:
            type: string
            default: wisexmlnew
        - name: dsp
          in: query
          schema:
            type: string
            default: iphone
        - name: product
          in: query
          schema:
            type: string
            default: stock
      responses:
        '200':
          description: 热搜股票 body/header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 5

  /sapi/v1/ranks:
    get:
      tags: [Ranking]
      operationId: getRanks
      summary: 综合排行（需 bizType）
      parameters:
        - name: bizType
          in: query
          schema:
            type: string
            enum: [marketStatus, chgdiagram, fund_rank, mainFundflow]
        - $ref: '#/components/parameters/market'
        - $ref: '#/components/parameters/pn'
        - $ref: '#/components/parameters/rn'
      responses:
        '200':
          description: 排行数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 2

  /sapi/v1/stock_ranks:
    get:
      tags: [Ranking]
      operationId: getStockRanks
      summary: 股票排行
      parameters:
        - $ref: '#/components/parameters/market'
        - $ref: '#/components/parameters/financeType'
        - name: sortKey
          in: query
          schema:
            type: string
            example: pxChangeRate
        - name: sortType
          in: query
          schema:
            type: string
            enum: [up, down]
        - $ref: '#/components/parameters/pn'
        - $ref: '#/components/parameters/rn'
      responses:
        '200':
          description: 股票排行
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 2

  /vapi/v1/analysisrank:
    get:
      tags: [Ranking, Finance]
      operationId: getAnalysisRank
      summary: 技术面分析评分排行
      parameters:
        - $ref: '#/components/parameters/market'
        - $ref: '#/components/parameters/pn'
        - $ref: '#/components/parameters/rn'
      responses:
        '200':
          description: 分析评分排行
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 4

  /vapi/sentimentrank:
    get:
      tags: [Ranking, Community]
      operationId: getSentimentRank
      summary: AI 舆情热度排行
      parameters:
        - $ref: '#/components/parameters/market'
        - $ref: '#/components/parameters/pn'
        - $ref: '#/components/parameters/rn'
      responses:
        '200':
          description: 舆情排行
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 4

  /sapi/v1/getinsthotstock:
    get:
      tags: [Ranking]
      operationId: getInstHotStock
      summary: 机构热门持股/增减持
      parameters:
        - $ref: '#/components/parameters/market'
        - name: holdingType
          in: query
          schema:
            type: string
            enum: [all, inc, dec, new, out]
      responses:
        '200':
          description: 机构持股变动
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 4

  /api/getforeignrank:
    get:
      tags: [Ranking, Forex]
      operationId: getForeignRank
      summary: 外汇涨跌幅排行
      responses:
        '200':
          description: 外汇排行
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 4

  /selfselect/listsugrecomm:
    get:
      tags: [Ranking, Search]
      operationId: getListSugRecomm
      summary: 搜索/板块综合热度推荐榜
      parameters:
        - name: tn
          in: query
          schema:
            type: string
            default: wisexmlnew
        - name: dsp
          in: query
          schema:
            type: string
            default: iphone
        - name: product
          in: query
          schema:
            type: string
            enum: [search, plate]
        - name: wd
          in: query
          schema:
            type: string
          description: 搜索关键词（product=search 时）
      responses:
        '200':
          description: 热度推荐列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 4

  /selfselect/getmarketrank:
    get:
      tags: [Ranking, Watchlist]
      operationId: getMarketRank
      summary: 自选市场排行（需登录）
      parameters:
        - $ref: '#/components/parameters/market'
        - $ref: '#/components/parameters/pn'
        - $ref: '#/components/parameters/rn'
      responses:
        '200':
          description: 市场排行
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 1
      x-auth-required: true

  # ─── Sector ──────────────────────────────────────────────────────────
  /vapi/v1/blocks/overview:
    get:
      tags: [Sector]
      operationId: getBlocksOverview
      summary: 板块概览（行业/概念/地域）
      parameters:
        - $ref: '#/components/parameters/market'
      responses:
        '200':
          description: 板块概览
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 5

  /vapi/v2/blocks:
    get:
      tags: [Sector]
      operationId: getBlocksV2
      summary: 板块列表 v2
      parameters:
        - $ref: '#/components/parameters/market'
        - name: blockType
          in: query
          schema:
            $ref: '#/components/schemas/BlockType'
        - $ref: '#/components/parameters/pn'
        - $ref: '#/components/parameters/rn'
      responses:
        '200':
          description: 板块列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 5

  /vapi/v3/blocks:
    get:
      tags: [Sector, FundFlow]
      operationId: getBlocksV3
      summary: 板块排行 v3（支持资金流排序）
      parameters:
        - $ref: '#/components/parameters/market'
        - name: type_code
          in: query
          schema:
            $ref: '#/components/schemas/BlockType'
        - name: sort_key
          in: query
          schema:
            type: string
            enum: [pxChangeRate, exmainIn, mainIn, mainOut]
            default: pxChangeRate
        - name: sort_type
          in: query
          schema:
            type: string
            enum: [up, down]
            default: down
        - $ref: '#/components/parameters/pn'
        - $ref: '#/components/parameters/rn'
      responses:
        '200':
          description: 板块排行
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 5

  /sapi/v1/constituents:
    get:
      tags: [Sector]
      operationId: getConstituents
      summary: 指数/ETF 成分股
      parameters:
        - $ref: '#/components/parameters/code'
        - $ref: '#/components/parameters/market'
        - $ref: '#/components/parameters/financeType'
        - $ref: '#/components/parameters/pn'
        - $ref: '#/components/parameters/rn'
        - name: style
          in: query
          schema:
            type: string
            enum: [heatmap]
      responses:
        '200':
          description: 成分股列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 5

  /vapi/v1/getindustrylist:
    get:
      tags: [Sector]
      operationId: getIndustryList
      summary: 行业分类树
      responses:
        '200':
          description: 行业层级列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 5

  /sapi/v1/index/main:
    get:
      tags: [Sector]
      operationId: getIndexMain
      summary: 指数主页数据
      parameters:
        - $ref: '#/components/parameters/code'
        - $ref: '#/components/parameters/market'
        - $ref: '#/components/parameters/financeType'
        - $ref: '#/components/parameters/finClientType'
      responses:
        '200':
          description: 指数主页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 2

  /sapi/v1/index/fluctuation:
    get:
      tags: [Sector]
      operationId: getIndexFluctuation
      summary: 指数波动分布
      parameters:
        - $ref: '#/components/parameters/code'
        - $ref: '#/components/parameters/market'
      responses:
        '200':
          description: 波动分布
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 2

  /sapi/v1/index/marketvalue:
    get:
      tags: [Sector]
      operationId: getIndexMarketValue
      summary: 指数市值分布
      parameters:
        - $ref: '#/components/parameters/code'
        - $ref: '#/components/parameters/market'
      responses:
        '200':
          description: 市值分布
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 2

  /sapi/v1/index/related:
    get:
      tags: [Sector]
      operationId: getIndexRelated
      summary: 指数关联标的
      parameters:
        - $ref: '#/components/parameters/code'
        - $ref: '#/components/parameters/market'
      responses:
        '200':
          description: 关联标的
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 2

  /sapi/v1/index/main-fundflow:
    get:
      tags: [Sector, FundFlow]
      operationId: getIndexMainFundflow
      summary: 指数主力资金流（行业/概念）
      parameters:
        - $ref: '#/components/parameters/code'
        - $ref: '#/components/parameters/market'
      responses:
        '200':
          description: 指数关联板块资金流
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
      x-stability: 4

  # ─── FundFlow ────────────────────────────────────────────────────────
  /vapi/v1/fundflow:
    get:
      tags: [FundFlow]
      operationId: getFundFlow
      summary: 个股资金流向
      parameters:
        - $ref: '#/components/parameters/code'
