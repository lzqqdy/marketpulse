components:
  parameters:
    code:
      name: code
      in: query
      required: true
      schema:
        type: string
      description: 证券代码
      example: '600519'

    market:
      name: market
      in: query
      schema:
        $ref: '#/components/schemas/Market'
      description: 市场

    marketType:
      name: market_type
      in: query
      schema:
        $ref: '#/components/schemas/Market'
      description: 市场（getquotation 使用 market_type）

    financeType:
      name: financeType
      in: query
      schema:
        $ref: '#/components/schemas/FinanceType'
      description: 资产类型

    finClientType:
      name: finClientType
      in: query
      schema:
        type: string
        default: pc
      description: 客户端类型

    newFormat:
      name: new_Format
      in: query
      schema:
        type: integer
        default: 1

    eprop:
      name: eprop
      in: query
      schema:
        $ref: '#/components/schemas/KlinePeriod'
      description: K 线周期

    ktype:
      name: ktype
      in: query
      schema:
        type: integer
        enum: [1, 2, 3, 4]
      description: '1=dayK, 2=weekK, 3=monthK, 4=yearK'

    period:
      name: period
      in: query
      schema:
        $ref: '#/components/schemas/KlinePeriod'
      description: K 线/技术事件周期

    pn:
      name: pn
      in: query
      schema:
        type: integer
        default: 0
      description: 页码（从 0 开始）

    rn:
      name: rn
      in: query
      schema:
        type: integer
        default: 20
      description: 每页条数

  schemas:
    Market:
      type: string
      enum: [ab, hk, us, sg, foreign, global]
      description: |
        - `ab` A 股（沪深）
        - `hk` 港股
        - `us` 美股
        - `sg` 新加坡
        - `foreign` 外汇
        - `global` 全球

    FinanceType:
      type: string
      enum: [stock, etf, index, block, bk, futures, foreign, global, bond]

    KlinePeriod:
      type: string
      enum:
        - dayK
        - weekK
        - monthK
        - yearK
        - 30minK
        - 60minK
        - 120minK
        - quarterK
        - halfYearK
        - 3yearK

    BlockType:
      type: string
      enum: [HY, GN, DY]
      description: HY=行业, GN=概念, DY=地域

    ResultCode:
      type: string
      description: |
        - `0` 成功
        - `-1` 服务端错误
        - `10003` 参数错误
        - `10006` 未登录
        - `3001` 权限不足

    APIResponse:
      type: object
      properties:
        QueryID:
          type: string
        ResultCode:
          $ref: '#/components/schemas/ResultCode'
        ResultMsg:
          type: string
        Result:
          type: object
          additionalProperties: true
        ResultNum:
          type: integer

    QuotationResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            Result:
              type: object
              properties:
                cur:
                  $ref: '#/components/schemas/CurrentPrice'
                pankouinfos:
                  type: object
                  properties:
                    list:
                      type: array
                      items:
                        $ref: '#/components/schemas/PankouItem'
                askinfos:
                  type: array
                  items:
                    $ref: '#/components/schemas/OrderBookLevel'
                buyinfos:
                  type: array
                  items:
                    $ref: '#/components/schemas/OrderBookLevel'
                priceinfo:
                  type: array
                  items:
                    $ref: '#/components/schemas/MinutePoint'
                useWS:
                  type: string
                  enum: ['0', '1']

    ChartResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            Result:
              type: object
              properties:
                newMarketData:
                  $ref: '#/components/schemas/KlineMarketData'
                priceinfo:
                  type: array
                  items:
                    $ref: '#/components/schemas/MinutePoint'
                cur:
                  $ref: '#/components/schemas/CurrentPrice'

    MarketStatusResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            Result:
              type: object
              properties:
                stock:
                  type: object
                  additionalProperties:
                    $ref: '#/components/schemas/MarketStatusItem'
                futures:
                  type: object
                  additionalProperties:
                    $ref: '#/components/schemas/MarketStatusItem'
                foreign:
                  type: object
                  additionalProperties:
                    $ref: '#/components/schemas/MarketStatusItem'
                index:
                  type: object
                  additionalProperties:
                    $ref: '#/components/schemas/MarketStatusItem'

    SugResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            Result:
              type: object
              properties:
                list:
                  type: array
                  items:
                    $ref: '#/components/schemas/SugItem'

    CurrentPrice:
      type: object
      properties:
        price:
          type: string
        ratio:
          type: string
          description: 涨跌幅，如 +1.93%
        increase:
          type: string
          description: 涨跌额
        volume:
          type: string
        amount:
          type: string
        unit:
          type: string
        time:
          type: string
        timeKey:
          type: string

    PankouItem:
      type: object
      properties:
        ename:
          type: string
          description: 字段英文名（open/high/low/volume/turnoverRatio 等）
        name:
          type: string
        value:
          type: string
        originValue:
          type: string
        status:
          type: string
          enum: [up, down]

    OrderBookLevel:
      type: object
      properties:
        price:
          type: string
        volume:
          type: string

    MinutePoint:
      type: object
      properties:
        time:
          type: string
          description: Unix 时间戳
        timeKey:
          type: string
          example: '0930'
        datetime:
          type: string
        price:
          type: string
        ratio:
          type: string
        increase:
          type: string
        volume:
          type: string
        avgPrice:
          type: string
        amount:
          type: string
        totalVolume:
          type: string
        totalAmount:
          type: string

    KlineMarketData:
      type: object
      properties:
        headers:
          type: array
          items:
            type: string
        keys:
          type: array
          items:
            type: string
          example: [timestamp, time, open, close, volume, high, low, amount, range, ratio, turnoverratio, preClose]
        marketData:
          type: string
          description: 分号分隔的多行 CSV，字段顺序与 keys 一致
        maxPoints:
          type: integer
        cx:
          type: string
        cxData:
          type: object

    MarketStatusItem:
      type: object
      properties:
        market:
          type: string
        marketName:
          type: string
        marketDate:
          type: string
          format: date
        tradeStatus:
          type: string
          enum: [TRADE, ENDTR, PRETR, POSTR]
        tradeStatusCN:
          type: string
        websocketEnabled:
          type: string
          enum: ['0', '1']

    SugItem:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        market:
          $ref: '#/components/schemas/Market'
        type:
          $ref: '#/components/schemas/FinanceType'
        price:
          type: string
        ratio:
          type: string
        exchange:
          type: string
          enum: [SH, SZ]

    WebSocketSubscribeMessage:
      type: object
      description: WebSocket 订阅消息（发送至 wss://finance-ws.pae.baidu.com）
      required: [source, method, product, items]
      properties:
        source:
          type: string
          default: pc-web
        method:
          type: string
          enum: [subscribe, unsubscribe, patch]
        product:
          type: string
          enum: [snapshot, tick, adr]
        items:
          type: array
          items:
            type: object
            required: [code, name, market, financeType]
            properties:
              code:
                type: string
              name:
                type: string
              market:
                $ref: '#/components/schemas/Market'
              financeType:
                $ref: '#/components/schemas/FinanceType'

  headers:
    Referer:
      description: 建议设置为 https://finance.baidu.com/
      schema:
        type: string
        default: https://finance.baidu.com/
    User-Agent:
      description: 浏览器 User-Agent
      schema:
        type: string

x-websocket:
  url: wss://finance-ws.pae.baidu.com
  heartbeat_seconds: 6
  reconnect:
    max_attempts: 5
    delay_ms: 3000
  polling_fallback_seconds: 30
